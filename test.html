<script>
(function() {
  var PASSWORD = "123";
  var API_URL = "https://script.google.com/macros/s/AKfycbyhzlTYzLTTVQB5HpvtrxZ-NMQB0HwT8dQH_MchZbN9xamE5lTvjh-N-RgNU730NMM9tw/exec";
  var originalPlayers = [];

  /* ================= API PRO ================= */
  function callAPI(action, data, method) {

    // auto chọn method
    if (!method) {
      method = (action === "loadPlayers") ? "GET" : "POST";
    }

    // ===== GET =====
    if (method === "GET") {
      return fetch(API_URL + "?action=" + action)
        .then(r => r.json());
    }

    // ===== POST =====
    var payload = { action: action };
    if (data) Object.assign(payload, data);

    return fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(r => r.text())
    .then(text => {
      try {
        return JSON.parse(text);
      } catch(e) {
        console.error("RAW:", text);
        throw new Error("API không trả JSON");
      }
    });
  }

  /* ================= UI ================= */
  function showStatus(msg, type) {
    var el = document.getElementById("status");
    el.className = "status show " + type;

    if (type === "loading") {
      el.innerHTML = '<span class="spinner"></span><span>' + msg + '</span>';
    } else {
      el.innerHTML = '<span>' + msg + '</span>';
    }

    if (type !== "loading") {
      setTimeout(() => el.className = "status", 4000);
    }
  }

  function updateStats(count) {
    document.getElementById("playerCount").innerText = count;

    if (count >= 4) {
      var rounds = count - 1;
      var matchesPerRound = Math.floor(count / 4);
      document.getElementById("matchCount").innerText = rounds * matchesPerRound;
      document.getElementById("roundCount").innerText = rounds;
    } else {
      document.getElementById("matchCount").innerText = "—";
      document.getElementById("roundCount").innerText = "—";
    }
  }

  function updatePlayerTags() {
    var text = document.getElementById("players").value.trim();
    var box = document.getElementById("playerTags");
    box.innerHTML = "";

    var list = text.split("\n").map(x => x.trim()).filter(x => x);

    list.forEach((p,i)=>{
      var tag = document.createElement("div");
      tag.className = "player-tag";
      tag.textContent = "👤 " + p;
      tag.style.animationDelay = (i*0.03)+"s";
      box.appendChild(tag);
    });

    updateStats(list.length);
  }

  function checkChanges() {
    var current = document.getElementById("players").value
      .split("\n").map(x=>x.trim()).filter(x=>x);

    var changed = current.length !== originalPlayers.length ||
      current.some((x,i)=>x!==originalPlayers[i]);

    document.getElementById("changeNotice").className =
      changed ? "change-notice show" : "change-notice";

    document.getElementById("newGameBtn").className =
      changed ? "btn btn-warning" : "btn btn-warning hidden";
  }

  /* ================= LOAD (FIX CHUẨN) ================= */
  function loadPlayers(retry) {

    if (!retry) retry = 0;

    showStatus("⏳ Đang tải danh sách...", "loading");
    document.getElementById("listStatus").textContent = "Đang tải...";

    callAPI("loadPlayers", null, "GET")
      .then(data => {

        console.log("LOAD:", data);

        if (!data || !data.success) {
          throw new Error(data ? data.error : "No response");
        }

        originalPlayers = data.players || [];

        document.getElementById("players").value =
          originalPlayers.join("\n");

        updatePlayerTags();
        checkChanges();

        document.getElementById("listStatus").textContent =
          "✅ " + originalPlayers.length + " VĐV";

        showStatus("✅ Đã tải " + originalPlayers.length + " VĐV", "success");
      })
      .catch(err => {

        console.error(err);

        if (retry < 2) {
          showStatus("🔄 Đang thử lại...", "loading");
          setTimeout(()=>loadPlayers(retry+1),1500);
          return;
        }

        document.getElementById("listStatus").textContent = "❌ Lỗi";
        showStatus("❌ Không load được dữ liệu", "error");
      });
  }

  /* ================= LOGIN ================= */
  function setLoggedIn(remember) {
    (remember ? localStorage : sessionStorage).setItem("pb_ok","1");
  }

  function isLoggedIn() {
    return localStorage.getItem("pb_ok")==="1" ||
           sessionStorage.getItem("pb_ok")==="1";
  }

  function clearLogin() {
    localStorage.removeItem("pb_ok");
    sessionStorage.removeItem("pb_ok");
  }

  window.doLogin = function() {
    if (document.getElementById("pass").value === PASSWORD) {
      setLoggedIn(document.getElementById("rememberMe").checked);
      document.getElementById("loginBox").className = "hidden";
      document.getElementById("mainBox").className = "";

      loadPlayers(); // 🔥 AUTO LOAD
    } else {
      alert("Sai mật khẩu!");
    }
  };

  window.doLogout = function() {
    clearLogin();
    location.reload();
  };

  /* ================= CREATE ================= */
  window.createGame = function() {

    var list = document.getElementById("players").value
      .split("\n").map(x=>x.trim()).filter(x=>x);

    if (list.length < 5 || list.length > 12) {
      alert("Cần 5–12 VĐV");
      return;
    }

    showStatus("⏳ Đang tạo game...", "loading");

    callAPI("savePlayers",{players:list})
      .then(()=>callAPI("createSchedule"))
      .then(()=>{
        originalPlayers = list.slice();
        checkChanges();
        showStatus("🔥 Tạo game thành công!", "success");
      })
      .catch(()=>{
        showStatus("❌ Lỗi tạo game", "error");
      });
  };

  /* ================= INIT ================= */
  document.addEventListener("DOMContentLoaded", function() {

    document.getElementById("players")
      .addEventListener("input", ()=>{
        updatePlayerTags();
        checkChanges();
      });

    if (isLoggedIn()) {
      document.getElementById("loginBox").className = "hidden";
      document.getElementById("mainBox").className = "";
      loadPlayers(); // 🔥 AUTO LOAD khi reload
    }
  });

})();
</script>
