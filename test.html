<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏓 Pickleball</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0b0f19;
    color: #fff;
    padding: 10px;
}
.wrapper {
    max-width: 600px;
    margin: auto;
}
.match-card {
    background: #141a2b;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
}
.mc-score-row input {
    width: 50px;
    text-align: center;
    font-size: 18px;
}
button {
    padding: 10px;
    width: 100%;
    border-radius: 8px;
    border: none;
    background: orange;
    font-weight: bold;
}
.saved { background: green; color: #fff; }
</style>
</head>

<body>

<div class="wrapper">
    <h2>🏓 Nhập tỷ số</h2>
    <div id="match-area">Loading...</div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbx7cwJckISpH91ypZ6H1FfIHcvzz-3fr3Ftk8Z6CnJKmY0TveaJiDMmaqRyzqznkY73/exec";

const SHEET_ID = "1GUr4TFhq_Ha65en9vthhtii35-RWg28qeEcLiVJaVek";
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;

let matchData = [];

function getSheet(sheet, range){
    return fetch(`${BASE}?tqx=out:json&sheet=${sheet}&range=${range}`)
    .then(r=>r.text())
    .then(t=>{
        const json = JSON.parse(t.match(/setResponse\(([\s\S]+)\)/)[1]);
        return json;
    });
}

function val(r,i){
    return r.c[i] ? r.c[i].v : "";
}

function render(data){
    const t = data.table;
    let html = "";

    let i = 0;

    t.rows.forEach(row=>{
        if(!row.c) return;

        i++;

        const id = "m"+i;

        const t1 = val(row,1)+" & "+val(row,2);
        const t2 = val(row,3)+" & "+val(row,4);

        html += `
        <div class="match-card" id="${id}">
            <div>${t1} vs ${t2}</div>

            <div class="mc-score-row">
                <input id="s1-${id}" type="number">
                -
                <input id="s2-${id}" type="number">
            </div>

            <button onclick="save('${id}')">Lưu</button>
        </div>
        `;
    });

    document.getElementById("match-area").innerHTML = html;
}

async function save(id){
    const s1 = document.getElementById("s1-"+id).value;
    const s2 = document.getElementById("s2-"+id).value;

    if(s1===""||s2===""){
        alert("Nhập đủ điểm");
        return;
    }

    try{
        const res = await fetch(API,{
            method:"POST",
            body: JSON.stringify({
                matchId:id,
                s1:parseInt(s1),
                s2:parseInt(s2)
            })
        });

        const data = await res.json();

        if(data.success){
            document.getElementById(id).classList.add("saved");
            alert("✅ Đã lưu");
        }else{
            alert("❌ "+data.error);
        }

    }catch(e){
        alert("Lỗi kết nối");
    }
}

async function init(){
    const data = await getSheet("lichthidau","A2:G100");
    render(data);
}

init();
</script>

</body>
</html>
