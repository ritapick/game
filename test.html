                            <!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* RESET & BASE */
* { box-sizing: border-box; outline: none; }
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0; padding: 0;
  min-height: 100vh;
  display: flex; justify-content: center;
}

/* BACKGROUND EFFECTS */
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(circle at 10% 20%, rgba(34,197,94,0.1) 0%, transparent 40%),
              radial-gradient(circle at 90% 80%, rgba(99,102,241,0.1) 0%, transparent 40%);
  z-index: -1; pointer-events: none;
}

.container {
  width: 100%; max-width: 500px;
  padding: 24px 16px;
  display: flex; flex-direction: column; gap: 20px;
}

/* LOGIN BOX */
.login-card {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid rgba(148, 163, 184, 0.1);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px 24px;
  text-align: center;
  margin-top: 40px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-icon {
  font-size: 40px; margin-bottom: 16px; display: inline-block;
}

h1 { font-size: 22px; font-weight: 700; margin: 0 0 24px; color: #f1f5f9; }
h2 { font-size: 18px; font-weight: 600; margin: 0 0 12px; color: #f1f5f9; }

input {
  width: 100%; padding: 14px; border-radius: 12px;
  background: rgba(15, 23, 42, 0.6); border: 2px solid #334155;
  color: white; font-size: 16px; margin-bottom: 16px;
  transition: 0.3s;
}
input:focus { border-color: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.15); }

textarea {
  width: 100%; height: 150px; padding: 14px; border-radius: 12px;
  background: rgba(15, 23, 42, 0.6); border: 2px solid #334155;
  color: #94a3b8; font-family: monospace; font-size: 14px; resize: vertical;
  margin-bottom: 12px; transition: 0.3s;
}
textarea:focus { border-color: #6366f1; color: #e2e8f0; }

button {
  width: 100%; padding: 14px; border-radius: 12px;
  border: none; font-weight: 600; font-size: 15px; cursor: pointer;
  transition: all 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
}
button:active { transform: scale(0.98); }

.btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 4px 12px rgba(34,197,94,0.3); }
.btn-info { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
.btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; box-shadow: 0 4px 12px rgba(245,158,11,0.3); }
.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }

/* MAIN INTERFACE */
.card {
  background: rgba(30, 41, 59, 0.6); border: 1px solid rgba(148,163,184,0.05);
  border-radius: 16px; padding: 20px; margin-bottom: 16px;
  animation: fadeUp 0.5s ease;
}

.status {
  padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 500;
  text-align: center; margin-top: 12px;
}
.status.info { background: rgba(99,102,241,0.15); color: #a5b4fc; }
.status.success { background: rgba(34,197,94,0.15); color: #86efac; }
.status.error { background: rgba(239,68,68,0.15); color: #fca5a5; }

.hidden { display: none !important; }
.spinner { width: 16px; height: 16px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.player-count {
  display: inline-block; background: rgba(34,197,94,0.2); color: #4ade80;
  padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-top: 8px;
}

.logout {
  position: absolute; top: 16px; right: 16px; background: rgba(239,68,68,0.15);
  color: #fca5a5; width: auto; padding: 6px 12px; font-size: 12px; border-radius: 8px;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  display: flex; justify-content: center; align-items: center; z-index: 100;
}
.modal {
  background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 24px; width: 90%; max-width: 360px;
}
.btn-group { display: flex; gap: 10px; margin-top: 20px; }
.btn-group button { flex: 1; }
</style>
</head>
<body>

<div class="container">
  
  <!-- LOGIN -->
  <div id="loginBox">
    <div class="login-card">
      <div class="login-icon">🏓</div>
      <h1>Pickleball Manager</h1>
      <input type="password" id="passInput" placeholder="Nhập mật khẩu..." onkeydown="if(event.key==='Enter')login()">
      <button class="btn-primary" onclick="login()">Đăng nhập</button>
      <div id="loginMsg" class="status error hidden" style="margin-top:12px"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="mainBox" class="hidden">
    <button class="logout" onclick="logout()">🚪 Thoát</button>
    
    <div style="text-align:center; margin-bottom:20px;">
      <h2>🏓 Quản lý giải đấu</h2>
      <span style="font-size:12px; color:#64748b;">Liên kết đến Sheet: DanhSachVDV</span>
    </div>

    <!-- DANH SÁCH -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span style="font-weight:600; color:#94a3b8;">📋 Danh sách VĐV</span>
        <span id="countBadge" class="player-count hidden">0 người</span>
      </div>
      <textarea id="playersBox" placeholder="Đang tải dữ liệu..."></textarea>
      <button class="btn-primary" onclick="saveData()">💾 Lưu danh sách</button>
    </div>

    <!-- HÀNH ĐỘNG -->
    <div class="card">
      <h2>🎮 Hành động Game</h2>
      
      <button class="btn-warning" style="margin-bottom:10px; padding:16px; font-size:16px;" onclick="openNewGameModal()">
        🚀 Tạo game mới (Lưu + Lịch)
      </button>
      
      <button class="btn-info" onclick="createSchedule()" style="margin-bottom:10px;">
        📅 Chỉ tạo lại lịch thi đấu
      </button>
      
      <button class="btn-primary" onclick="goScore()" style="background:linear-gradient(135deg, #06b6d4, #0891b2);">
        🏆 Chuyển đến trang nhập tỷ số ➡️
      </button>
    </div>

    <div id="mainStatus" class="status info hidden"></div>
  </div>
</div>

<!-- MODAL XÁC NHẬN -->
<div id="newGameModal" class="modal-overlay hidden">
  <div class="modal">
    <h3 style="margin-top:0">⚠️ Xác nhận tạo game mới</h3>
    <p style="color:#94a3b8; font-size:14px;">Hành động này sẽ <b>ghi đè</b> toàn bộ danh sách hiện tại vào Sheet và <b>xóa lịch cũ</b> để tạo lịch mới. Bạn có chắc chắn?</p>
    <div class="btn-group">
      <button class="btn-danger" onclick="closeModal()">Hủy</button>
      <button class="btn-primary" onclick="runNewGame()">Tiến hành</button>
    </div>
  </div>
</div>

<script>
// ================= CẤU HÌNH =================
const PASSWORD = "123";
const SCORE_URL = "https://ductrong49.github.io/ritapickleball/tyso.html";
// Thay thế URL này bằng URL Web App của bạn sau khi Deploy
const API_URL = "https://script.google.com/macros/s/AKfycbwNm0ukxNupK93Cefo77tf2C-x0Eb3pQGRaqxQZ4up7Puh5m_zaO5CMBk0BWg0d3Mo_0Q/exec";

// ================= XỬ LÝ =================
function login() {
  const p = document.getElementById('passInput').value;
  const msg = document.getElementById('loginMsg');
  
  if (p === PASSWORD) {
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('mainBox').classList.remove('hidden');
    loadData();
  } else {
    msg.textContent = "Sai mật khẩu!";
    msg.classList.remove('hidden');
  }
}

function logout() {
  location.reload();
}

function showStatus(elId, msg, type) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.className = `status ${type}`;
  el.classList.remove('hidden');
}

// 🛠️ HÀM FETCH AN TOÀN (TRÁNH LỖI '<')
async function fetchSafe(url, options = {}) {
  const res = await fetch(url, options);
  const text = await res.text();
  if (text.trim().startsWith('<')) {
    throw new Error("Lỗi kết nối API: Không nhận được JSON. Vui lòng kiểm tra lại quyền truy cập Web App (Anyone).");
  }
  return JSON.parse(text);
}

// 🔥 LOAD DATA
async function loadData() {
  const txtBox = document.getElementById('playersBox');
  const statusEl = document.getElementById('mainStatus');
  
  txtBox.value = "⏳ Đang tải...";
  txtBox.disabled = true;
  showStatus('mainStatus', '⏳ Đang tải danh sách...', 'info');

  try {
    const json = await fetchSafe(API_URL + "?action=getPlayers");
    if (!json.success) throw new Error(json.error);
    
    txtBox.value = json.players.join('\n');
    txtBox.disabled = false;
    
    // Update badge
    const badge = document.getElementById('countBadge');
    badge.textContent = `${json.players.length} VĐV`;
    badge.classList.remove('hidden');
    
    showStatus('mainStatus', '✅ Đã tải xong!', 'success');
  } catch (err) {
    txtBox.value = "❌ Lỗi tải dữ liệu";
    txtBox.disabled = false;
    showStatus('mainStatus', err.message, 'error');
  }
}

// 💾 SAVE DATA
async function saveData() {
  const text = document.getElementById('playersBox').value;
  const lines = text.split('\n').map(s => s.trim()).filter(s => s);
  const statusEl = document.getElementById('mainStatus');

  if (lines.length === 0) { alert("Danh sách trống!"); return; }
  
  showStatus('mainStatus', '⏳ Đang lưu...', 'info');
  
  try {
    const json = await fetchSafe(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'savePlayers', players: lines })
    });
    if (!json.success) throw new Error(json.error);
    
    showStatus('mainStatus', '✅ Đã lưu thành công!', 'success');
    loadData(); // Reload để cập nhật badge
  } catch (err) {
    showStatus('mainStatus', err.message, 'error');
  }
}

// 📅 CREATE SCHEDULE
async function createSchedule() {
  const statusEl = document.getElementById('mainStatus');
  showStatus('mainStatus', '⏳ Đang tạo lịch thi đấu...', 'info');

  try {
    const json = await fetchSafe(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'createSchedule' })
    });
    if (!json.success) throw new Error(json.error);
    
    showStatus('mainStatus', '✅ Đã tạo lịch!', 'success');
  } catch (err) {
    showStatus('mainStatus', err.message, 'error');
  }
}

// 🚀 NEW GAME (SAVE + SCHEDULE)
function openNewGameModal() { document.getElementById('newGameModal').classList.remove('hidden'); }
function closeModal() { document.getElementById('newGameModal').classList.add('hidden'); }

async function runNewGame() {
  closeModal();
  const statusEl = document.getElementById('mainStatus');
  showStatus('mainStatus', '🔄 Đang xử lý: Bước 1/2 (Lưu danh sách)...', 'info');

  try {
    // Bước 1: Save
    const text = document.getElementById('playersBox').value;
    const lines = text.split('\n').map(s => s.trim()).filter(s => s);
    
    await fetchSafe(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'savePlayers', players: lines })
    });

    // Bước 2: Schedule
    showStatus('mainStatus', '🔄 Đang xử lý: Bước 2/2 (Tạo lịch)...', 'info');
    await fetchSafe(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'createSchedule' })
    });

    showStatus('mainStatus', '🎉 HOÀN TẤT! Đã tạo Game mới.', 'success');
  } catch (err) {
    showStatus('mainStatus', err.message, 'error');
  }
}

// ➡️ GO SCORE
function goScore() { window.location.href = SCORE_URL; }
</script>

</body>
</html>



              <script>
                              // ==========================================
// GOOGLE APPS SCRIPT - Code.gs
// ==========================================
const SHEET_ID = "1GUr4TFhq_Ha65en9vthhtii35-RWg28qeEcLiVJaVek";
const SHEET_NAME = "DanhSachVDV";

function doGet(e) {
  return processRequest(e);
}

function doPost(e) {
  return processRequest(e);
}

function processRequest(e) {
  // Kích hoạt Lock Service để tránh ghi đè dữ liệu khi có nhiều request cùng lúc
  const lock = LockService.getScriptLock();
  lock.tryLock(10000); 

  try {
    let action = "";
    let data = {};

    // Xử lý GET request (loadPlayers)
    if (e.parameter && e.parameter.action) {
      action = e.parameter.action;
    }
    
    // Xử lý POST request (savePlayers, createSchedule)
    if (e.postData) {
      const postData = JSON.parse(e.postData.contents);
      action = postData.action;
      data = postData;
    }

    // Routing các action
    if (action === "getPlayers") {
      return returnJSON(getPlayers());
    }
    if (action === "savePlayers") {
      return returnJSON(savePlayers(data.players));
    }
    if (action === "createSchedule") {
      return returnJSON(createSchedule());
    }

    return returnJSON({ success: false, error: "Action không hợp lệ" });

  } catch (err) {
    return returnJSON({ success: false, error: "Lỗi hệ thống: " + err.toString() });
  } finally {
    lock.releaseLock();
  }
}

// === HÀM XỬ LÝ DỮ LIỆU ===

function getSheet() {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  const sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) throw new Error(`Không tìm thấy sheet "${SHEET_NAME}"`);
  return sheet;
}

function getPlayers() {
  try {
    const sheet = getSheet();
    const lastRow = sheet.getLastRow();
    if (lastRow < 2) return { success: true, players: [] };
    
    // Đọc từ A2 đến dòng cuối
    const rawData = sheet.getRange(2, 1, lastRow - 1, 1).getValues();
    const players = rawData
      .flat()
      .map(p => String(p).trim())
      .filter(p => p !== "");
      
    return { success: true, players: players };
  } catch (e) {
    return { success: false, error: e.message };
  }
}

function savePlayers(playersArray) {
  try {
    if (!Array.isArray(playersArray)) throw new Error("Dữ liệu đầu vào không phải là mảng");
    
    const sheet = getSheet();
    
    // Xóa dữ liệu cũ từ A2
    const range = sheet.getRange(2, 1, sheet.getMaxRows() - 1, 1);
    range.clearContent();

    if (playersArray.length > 0) {
      // Lọc rỗng và ghi dữ liệu mới
      const cleanPlayers = playersArray
        .map(p => String(p).trim())
        .filter(p => p !== "")
        .map(p => [p]); // Chuyển thành mảng 2 chiều [[A], [B]]
      
      if (cleanPlayers.length > 0) {
        sheet.getRange(2, 1, cleanPlayers.length, 1).setValues(cleanPlayers);
      }
    }
    
    return { success: true, message: "Đã cập nhật " + playersArray.length + " VĐV" };
  } catch (e) {
    return { success: false, error: e.message };
  }
}

function createSchedule() {
  try {
    // 🔥 THÊM LOGIC TẠO LỊCH CỦA BẠN TẠI ĐÂY
    // Ví dụ: Đọc danh sách, tính toán cặp đấu, ghi sang sheet 'LichThiDau'
    
    return { success: true, message: "Đã kích hoạt tạo lịch thi đấu thành công!" };
  } catch (e) {
    return { success: false, error: e.message };
  }
}

function returnJSON(data) {
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}


              </script>
                        </body>
                        </html>
