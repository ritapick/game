<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏓 Giải Đấu Pickleball - Robin Round</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff6b35;
            --primary-glow: rgba(255,107,53,0.4);
            --secondary: #00b4d8;
            --accent: #ffd166;
            --bg-dark: #0b0f19;
            --bg-card: #141a2b;
            --bg-card-hover: #1c2438;
            --border: rgba(255,255,255,0.06);
            --text: #e8ecf4;
            --text-dim: #7a8ba5;
            --green: #22c55e;
            --red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 15% 20%, rgba(255,107,53,0.07) 0%, transparent 45%),
                radial-gradient(ellipse at 85% 80%, rgba(0,180,216,0.07) 0%, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 16px 12px 40px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 24px 8px 28px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 30px;
            margin-bottom: 14px;
            box-shadow: 0 0 18px var(--primary-glow);
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #fff 30%, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.05;
        }

        header p {
            color: var(--text-dim);
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .divider {
            width: 60px; height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            margin: 16px auto 0;
            border-radius: 2px;
        }

        /* Section */
        .section { margin-bottom: 28px; }

        .section-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .section-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .icon-rank { background: linear-gradient(135deg, var(--primary), #ff9248); }
        .icon-match { background: linear-gradient(135deg, var(--secondary), #0096c7); }

        .section-head h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-head h2 span { color: var(--accent); }

        .badge-count {
            margin-left: auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 3px 10px;
            border-radius: 14px;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Loading */
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 36px 12px;
            gap: 14px;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: rotate 0.7s linear infinite;
        }

        @keyframes rotate { to { transform: rotate(360deg); } }

        .loader-text { color: var(--text-dim); font-size: 0.85rem; }

        /* Ranking Table */
        .rank-wrap {
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 320px;
            font-size: 0.85rem;
        }

        .rank-table thead th {
            background: rgba(255,107,53,0.1);
            padding: 11px 10px;
            font-family: 'Oswald', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            text-align: center;
            color: var(--accent);
            border-bottom: 2px solid var(--primary);
            white-space: nowrap;
            position: sticky;
            top: 0;
        }

        .rank-table thead th:first-child { width: 42px; }

        .rank-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .rank-table tbody tr:hover { background: rgba(255,107,53,0.04); }
        .rank-table tbody tr:last-child { border-bottom: none; }

        .rank-table td {
            padding: 10px 10px;
            text-align: center;
            vertical-align: middle;
        }

        .rank-table td:first-child {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .rank-table td:nth-child(2) {
            text-align: left;
            font-weight: 500;
        }

        .rank-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px; height: 28px;
            border-radius: 50%;
            font-size: 0.78rem;
        }

        .r1 { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; box-shadow: 0 0 8px rgba(255,215,0,0.5); }
        .r2 { background: linear-gradient(135deg, #c0c0c0, #8a8a8a); color: #000; }
        .r3 { background: linear-gradient(135deg, #cd7f32, #a05a18); color: #fff; }
        .r0 { background: var(--bg-card-hover); color: var(--text-dim); }

        /* Match Cards */
        .match-grid {
            display: grid;
            gap: 12px;
        }

        .match-card {
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.25s ease;
            animation: fadeUp 0.45s ease forwards;
            opacity: 0;
        }

        .match-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px rgba(255,107,53,0.12);
            border-color: rgba(255,107,53,0.25);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mc-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 14px;
            background: rgba(255,255,255,0.015);
            border-bottom: 1px solid var(--border);
        }

        .mc-round {
            font-family: 'Oswald', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
            background: var(--bg-card-hover);
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .mc-status {
            font-size: 0.68rem;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mc-status.done {
            background: rgba(34,197,94,0.15);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.3);
        }

        .mc-status.wait {
            background: rgba(255,209,102,0.15);
            color: var(--accent);
            border: 1px solid rgba(255,209,102,0.3);
        }

        .mc-body {
            padding: 16px 12px;
        }

        .mc-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .mc-team {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            text-align: center;
        }

        .mc-team-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-dim);
        }

        .mc-team-names {
            font-weight: 600;
            font-size: 0.85rem;
            line-height: 1.45;
        }

        .mc-team-names .amp {
            display: block;
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.75rem;
        }

        .mc-vs {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            min-width: 70px;
        }

        .vs-circle {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: #000;
        }

        .mc-score-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mc-score {
            font-family: 'Oswald', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            min-width: 30px;
            text-align: center;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .mc-score.s1 {
            color: var(--primary);
            background: rgba(255,107,53,0.12);
            border: 1px solid rgba(255,107,53,0.25);
        }

        .mc-score.s2 {
            color: var(--secondary);
            background: rgba(0,180,216,0.12);
            border: 1px solid rgba(0,180,216,0.25);
        }

        .mc-score.sep {
            color: var(--text-dim);
            font-size: 1rem;
            padding: 0;
            background: none;
            border: none;
            min-width: auto;
        }

        .mc-noscore {
            color: var(--text-dim);
            font-size: 0.75rem;
            font-style: italic;
        }

        .mc-footer {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 14px;
        }

        .mc-wins {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .mc-wins strong {
            color: var(--accent);
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
        }

        /* Error */
        .err-box {
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 12px;
            padding: 20px 16px;
            text-align: center;
        }

        .err-box h3 { color: var(--red); margin-bottom: 6px; font-size: 1rem; }
        .err-box p { color: var(--text-dim); font-size: 0.85rem; }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 12px 10px;
            color: var(--text-dim);
            font-size: 0.78rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bg-card-hover); border-radius: 3px; }

        /* Responsive tweaks */
        @media (max-width: 420px) {
            .mc-team-names { font-size: 0.8rem; }
            .mc-score { font-size: 1.25rem; min-width: 26px; }
            .vs-circle { width: 32px; height: 32px; font-size: 0.7rem; }
            .mc-vs { min-width: 60px; }
            .rank-table { font-size: 0.8rem; }
            .rank-table th, .rank-table td { padding: 9px 6px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <div class="badge">🏓 Robin Round</div>
        <h1>Giải Đấu Pickleball</h1>
        <p>Bảng xếp hạng & Lịch thi đấu</p>
        <div class="divider"></div>
    </header>

    <!-- Ranking -->
    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-rank">🏆</div>
            <h2>Bảng <span>Xếp Hạng</span></h2>
        </div>
        <div id="rank-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>

    <!-- Matches -->
    <section class="section">
        <div class="section-head">
            <div class="section-icon icon-match">⚡</div>
            <h2>Lịch Thi Đấu & <span>Kết Quả</span></h2>
            <div class="badge-count" id="mc-count"></div>
        </div>
        <div id="match-area">
            <div class="loader"><div class="spinner"></div><span class="loader-text">Đang tải...</span></div>
        </div>
    </section>

    <footer>🏓 Dữ liệu đồng bộ từ Google Sheets</footer>
</div>

<script>
    const SHEET_ID = '1GUr4TFhq_Ha65en9vthhtii35-RWg28qeEcLiVJaVek';
    const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;

    function getSheet(sheetName, range) {
        const url = `${BASE}?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(range)}`;
        return fetch(url).then(r => r.text()).then(txt => {
            const m = txt.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?$/);
            if (!m) throw new Error('Parse data failed');
            return JSON.parse(m[1]);
        });
    }

    function val(row, ci) {
        if (!row.c || !row.c[ci] || row.c[ci].v == null) return '';
        return String(row.c[ci].v);
    }

    function renderRanking(data) {
        const el = document.getElementById('rank-area');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            el.innerHTML = '<div class="err-box"><h3>Không có dữ liệu</h3></div>';
            return;
        }
        const hdrs = t.cols.map(c => c.label || '');
        let h = '<div class="rank-wrap"><table class="rank-table"><thead><tr><th>#</th>';
        hdrs.forEach(x => { h += `<th>${x}</th>`; });
        h += '</tr></thead><tbody>';

        t.rows.forEach((row, i) => {
            const has = row.c && row.c.some(c => c && c.v !== '' && c.v !== null);
            if (!has) return;
            const rc = i < 3 ? `r${i+1}` : 'r0';
            h += `<tr><td><span class="rank-num ${rc}">${i+1}</span></td>`;
            for (let j = 0; j < hdrs.length; j++) {
                const cls = j === 1 ? ' style="text-align:left;font-weight:500"' : '';
                h += `<td${cls}>${val(row, j)}</td>`;
            }
            h += '</tr>';
        });

        h += '</tbody></table></div>';
        el.innerHTML = h;
    }

    function renderMatches(data) {
        const el = document.getElementById('match-area');
        const cnt = document.getElementById('mc-count');
        const t = data.table;
        if (!t || !t.rows || t.rows.length === 0) {
            el.innerHTML = '<div class="err-box"><h3>Không có dữ liệu</h3></div>';
            cnt.textContent = '';
            return;
        }

        // Columns: A=0(round) B=1(t1p1) C=2(t1p2) D=3(t2p1) E=4(t2p2) F=5 G=6(score1) H=7(score2)
        let count = 0;
        let h = '<div class="match-grid">';

        t.rows.forEach((row, idx) => {
            const has = row.c && row.c.some(c => c && c.v !== '' && c.v !== null);
            if (!has) return;
            count++;

            const round = val(row, 0);
            const t1p1 = val(row, 1);
            const t1p2 = val(row, 2);
            const t2p1 = val(row, 3);
            const t2p2 = val(row, 4);
            const s1 = val(row, 6);
            const s2 = val(row, 7);
            const hasScore = s1 !== '' && s2 !== '';
            const stCls = hasScore ? 'done' : 'wait';
            const stTxt = hasScore ? 'Hoàn thành' : 'Chờ đấu';
            const delay = Math.min(idx * 0.04, 1.5);

            h += `<div class="match-card" style="animation-delay:${delay}s">`;
            h += `<div class="mc-head"><span class="mc-round">${round || 'Trận ' + count}</span><span class="mc-status ${stCls}">${stTxt}</span></div>`;
            h += `<div class="mc-body"><div class="mc-teams">`;

            h += `<div class="mc-team"><span class="mc-team-label">Đội 1</span><div class="mc-team-names">${t1p1}<span class="amp">&</span>${t1p2}</div></div>`;

            h += `<div class="mc-vs"><div class="vs-circle">VS</div>`;
            if (hasScore) {
                h += `<div class="mc-score-row"><span class="mc-score s1">${s1}</span><span class="mc-score sep">-</span><span class="mc-score s2">${s2}</span></div>`;
            } else {
                h += `<span class="mc-noscore">Chưa đấu</span>`;
            }
            h += `</div>`;

            h += `<div class="mc-team"><span class="mc-team-label">Đội 2</span><div class="mc-team-names">${t2p1}<span class="amp">&</span>${t2p2}</div></div>`;

            h += `</div></div></div>`;
        });

        h += '</div>';
        el.innerHTML = h;
        cnt.textContent = `${count} trận`;
    }

    async function init() {
        try {
            const [rankRes, matchRes] = await Promise.all([
                getSheet('danhsachvdv', 'E1:I25'),
                getSheet('lichthidau', 'A2:H100')
            ]);
            renderRanking(rankRes);
            renderMatches(matchRes);
        } catch (e) {
            console.error(e);
            const errMsg = `<div class="err-box"><h3>⚠️ Lỗi tải dữ liệu</h3><p>${e.message}</p><p style="margin-top:6px;font-size:0.8rem;">Đảm bảo Google Sheet đã chia sẻ công khai.</p></div>`;
            document.getElementById('rank-area').innerHTML = errMsg;
            document.getElementById('match-area').innerHTML = errMsg;
        }
    }

    init();
</script>

</body>
</html>
