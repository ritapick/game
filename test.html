<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Score</title>

<style>
body{background:#0b0f19;color:#fff;font-family:Arial;padding:10px}
.match{background:#141a2b;margin-bottom:10px;padding:10px;border-radius:10px}
.row{display:flex;align-items:center;justify-content:space-between}
.score{display:flex;gap:6px;align-items:center}
input{width:50px;height:35px;text-align:center;font-size:18px}
button{cursor:pointer;padding:4px 6px}
.saved{background:#22c55e;color:#fff}
</style>
</head>

<body>

<h2>🏓 Nhập tỷ số</h2>
<div id="app"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx7cwJckISpH91ypZ6H1FfIHcvzz-3fr3Ftk8Z6CnJKmY0TveaJiDMmaqRyzqznkY73/exec";

const SHEET_ID = "1GUr4TFhq_Ha65en9vthhtii35-RWg28qeEcLiVJaVek";
const BASE = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq`;

let matchData = [];

function getSheet() {
    return fetch(`${BASE}?tqx=out:json&sheet=lichthidau&range=A2:G100`)
    .then(r=>r.text())
    .then(t=>{
        const json = JSON.parse(t.match(/setResponse\(([\s\S]+)\)/)[1]);
        return json.table.rows;
    });
}

function val(row,i){
    return row.c[i] ? row.c[i].v : "";
}

function render(rows){
    const app = document.getElementById("app");
    app.innerHTML = "";

    rows.forEach((row,idx)=>{
        const r = idx+2;

        const html = `
        <div class="match">
            <div class="row">
                <div>${val(row,1)} & ${val(row,2)}</div>
                <div class="score">
                    <div>
                        <input id="s1-${idx}" value="${val(row,5)||''}">
                        <button onclick="saveCell(${idx},1)">💾</button>
                    </div>

                    <span>-</span>

                    <div>
                        <input id="s2-${idx}" value="${val(row,6)||''}">
                        <button onclick="saveCell(${idx},2)">💾</button>
                    </div>
                </div>
                <div>${val(row,3)} & ${val(row,4)}</div>
            </div>
        </div>
        `;
        app.innerHTML += html;

        matchData[idx] = { row: r };
    });
}

async function saveCell(index,type){
    const id = type===1 ? `s1-${index}` : `s2-${index}`;
    const el = document.getElementById(id);

    const v = el.value.trim();
    if(v===""){
        alert("Chưa nhập số");
        return;
    }

    const num = parseInt(v);
    if(isNaN(num)){
        alert("Sai số");
        return;
    }

    const row = matchData[index].row;
    const col = type===1 ? 6 : 7;

    try{
        await fetch(API_URL,{
            method:"POST",
            body: JSON.stringify({
                row: row,
                col: col,
                value: num
            })
        });

        el.classList.add("saved");
        setTimeout(()=>el.classList.remove("saved"),1000);

    }catch(e){
        alert("Lỗi lưu");
    }
}

async function init(){
    const rows = await getSheet();
    render(rows);
}

init();
</script>

</body>
</html>
