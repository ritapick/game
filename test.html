<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Manager</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.btn-score {
  background: #f59e0b;
}

.hidden { display: none; }

.status {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginBox">
    <h2>🔐 Đăng nhập</h2>
    <input type="password" id="pass" placeholder="Nhập mật khẩu">
    <button onclick="login()">Đăng nhập</button>
  </div>

  <!-- MAIN -->
  <div id="mainBox" class="hidden">
    <h2>🏓 Quản lý giải Pickleball</h2>

    <textarea id="players" rows="10" placeholder="Đang tải danh sách..."></textarea>

    <button onclick="savePlayers()">💾 Lưu danh sách</button>
    <button onclick="createSchedule()">🔥 Tạo lịch thi đấu</button>

    <!-- NÚT MỚI -->
    <button class="btn-score" onclick="goScore()">➡️ Nhập tỷ số</button>

    <div class="status" id="status"></div>
  </div>

</div>

<script>
const PASSWORD = "123";

const API_URL = "https://script.google.com/macros/s/AKfycbxyjSKqBHxBoIuMIrmx8niKyYPVeAkMFVA3czmi5Zm5DG_LY_7MzkQhXF2TghhF0Dpu3Q/exec";

// LOGIN
function login() {
  let pass = document.getElementById("pass").value;

  if (pass === PASSWORD) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("mainBox").classList.remove("hidden");

    loadPlayers(); // 🔥 LOAD SAU LOGIN
  } else {
    alert("Sai mật khẩu!");
  }
}

// 🔥 LOAD DANH SÁCH TỪ SHEET
async function loadPlayers() {
  document.getElementById("status").innerText = "⏳ Đang tải danh sách...";

  try {
    const res = await fetch(API_URL + "?action=getPlayers");
    const json = await res.json();

    if (!json.success) {
      document.getElementById("status").innerText = "❌ Lỗi load danh sách";
      return;
    }

    // convert array -> textarea
    const text = json.players.join("\n");
    document.getElementById("players").value = text;

    document.getElementById("status").innerText = "✅ Đã tải danh sách";

  } catch (e) {
    document.getElementById("status").innerText = "❌ Không kết nối API";
  }
}

// LƯU DANH SÁCH
function savePlayers() {
  let text = document.getElementById("players").value.trim();

  if (!text) {
    alert("Nhập danh sách VĐV!");
    return;
  }

  let players = text.split("\n").map(x => x.trim()).filter(x => x);

  document.getElementById("status").innerText = "⏳ Đang lưu...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "savePlayers",
      players: players
    })
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("status").innerText = "✅ Đã lưu danh sách";
  })
  .catch(() => {
    document.getElementById("status").innerText = "❌ Lỗi lưu!";
  });
}

// TẠO LỊCH
function createSchedule() {
  document.getElementById("status").innerText = "⏳ Đang tạo lịch...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "createSchedule"
    })
  })
  .then(res => res.json())
  .then(() => {
    document.getElementById("status").innerText = "🔥 Đã tạo lịch!";
  })
  .catch(() => {
    document.getElementById("status").innerText = "Tạo lịch hoàn thành";
  });
}

// 👉 CHUYỂN TRANG NHẬP TỶ SỐ
function goScore() {
  window.location.href = "https://ductrong49.github.io/ritapickleball/tyso.html";
}
</script>

</body>
</html>
