<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx7cwJckISpH91ypZ6H1FfIHcvzz-3fr3Ftk8Z6CnJKmY0TveaJiDMmaqRyzqznkY73/exec';

async function saveSingleScore(matchId) {
    const el1 = document.getElementById(`s1-${matchId}`);
    const el2 = document.getElementById(`s2-${matchId}`);
    const sbtn = document.getElementById(`sbtn-${matchId}`);

    const v1 = el1.value.trim();
    const v2 = el2.value.trim();

    if (v1 === '' || v2 === '') {
        showToast('⚠️ Nhập đủ tỷ số', 'warning');
        return;
    }

    const n1 = parseInt(v1);
    const n2 = parseInt(v2);

    const match = matchData.find(m => m.id === matchId);

    // UI loading
    sbtn.innerHTML = 'Đang lưu...';

    try {
        const res = await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                action: 'updateScore',
                rowIndex: match.rowIndex,
                score1: n1,
                score2: n2
            })
        });

        const data = await res.json();

        if (data.success) {
            showToast('✅ Lưu thành công', 'success');

            sbtn.innerHTML = '✓ Đã lưu';
        } else {
            throw new Error(data.message);
        }

    } catch (err) {
        console.error(err);
        showToast('❌ Lỗi lưu dữ liệu', 'error');
        sbtn.innerHTML = 'Lưu lại';
    }
}
</script>
